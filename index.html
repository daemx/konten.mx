<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konten.mx — Sistema de Escalamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

<style>
  :root{
    --bg: #000000;
    --panel: rgba(15,17,22,0.82);
    --panel-solid: #0D0F14;
    --panel-2: rgba(20,23,30,0.85);
    --line: rgba(255,255,255,0.08);
    --blue: #5B8CFF;
    --mint: #00E5A0;
    --text: #EDEFF4;
    --text-dim: #8892A6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{background:var(--blue); color:var(--bg);}
  .wrap{max-width:1120px; margin:0 auto; padding:0 28px; position:relative; z-index:2;}
  h1,h2,h3{font-family:'Space Grotesk', sans-serif;}
  .mono{font-family:'JetBrains Mono', monospace;}

  #bg-canvas{
    position:fixed; inset:0; width:100vw; height:100vh; z-index:0; pointer-events:none;
  }
  .bg-fade{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 40%, rgba(0,0,0,0.85) 100%);
  }

  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(0,0,0,0.6); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 28px; max-width:1120px; margin:0 auto;}
  .logo{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; letter-spacing:-0.3px;}
  .logo span{color:var(--blue);}
  .nav-cta{
    font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.3px;
    color:var(--bg); background:var(--mint); padding:9px 18px; border-radius:6px;
    text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .nav-cta:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,229,160,0.25);}

  .hero{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:140px 0 60px; position:relative;
  }
  .badge{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text-dim);
    background:var(--panel); border:1px solid var(--line); padding:6px 12px; border-radius:20px;
    margin-bottom:24px; backdrop-filter:blur(6px);
  }
  .badge .dot{width:6px; height:6px; border-radius:50%; background:var(--mint); box-shadow:0 0 8px var(--mint); animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.4;}}

  .hero h1{
    font-size:clamp(36px,6vw,64px); line-height:1.05; letter-spacing:-1.4px; font-weight:700;
    max-width:760px; margin:0 auto;
  }
  .hero h1 .accent{color:var(--blue);}
  .hero p{color:var(--text-dim); font-size:17.5px; line-height:1.6; max-width:520px; margin:22px auto 0;}
  .hero-ctas{display:flex; gap:14px; margin-top:36px; flex-wrap:wrap; justify-content:center;}
  .btn-primary{
    background:var(--blue); color:#fff; font-weight:600; font-size:14.5px; padding:14px 26px;
    border-radius:8px; text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 10px 28px rgba(91,140,255,0.35);}
  .btn-ghost{
    color:var(--text); font-size:14.5px; padding:14px 8px; text-decoration:none;
    border-bottom:1px solid var(--line); transition:border-color 0.15s ease;
  }
  .btn-ghost:hover{border-color:var(--blue);}

  .scroll-hint{
    margin-top:70px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);
    display:flex; flex-direction:column; align-items:center; gap:8px; letter-spacing:1px;
  }
  .scroll-hint .line{width:1px; height:34px; background:linear-gradient(var(--blue), transparent); animation:scrollmove 1.8s ease infinite;}
  @keyframes scrollmove{0%{transform:scaleY(0); transform-origin:top;} 50%{transform:scaleY(1); transform-origin:top;} 51%{transform-origin:bottom;} 100%{transform:scaleY(0); transform-origin:bottom;}}

  .video-section{padding:70px 0 100px; position:relative;}
  .section-label{font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:1.5px; color:var(--blue); text-transform:uppercase; margin-bottom:14px;}
  h2{font-size:clamp(26px,3.6vw,38px); letter-spacing:-0.6px; max-width:620px; margin-bottom:16px; font-weight:700;}
  .section-intro{color:var(--text-dim); font-size:15.5px; max-width:540px; line-height:1.6;}

  .video-frame{
    margin-top:40px; position:relative; width:100%; aspect-ratio:16/9; border-radius:16px;
    background:linear-gradient(150deg, var(--panel-2), var(--panel-solid));
    border:1px solid var(--line); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  .video-frame .corner-tag{
    position:absolute; top:18px; left:20px; font-family:'JetBrains Mono',monospace; font-size:11px;
    color:var(--text-dim); letter-spacing:1px; display:flex; align-items:center; gap:8px;
  }
  .video-frame .corner-tag .dot{width:6px; height:6px; border-radius:50%; background:var(--mint);}
  .video-frame .duration{
    position:absolute; bottom:18px; right:20px; font-family:'JetBrains Mono',monospace; font-size:11px;
    color:var(--text-dim); background:rgba(0,0,0,0.5); padding:4px 10px; border-radius:5px;
  }
  .play-btn{
    width:72px; height:72px; border-radius:50%; background:var(--blue);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease; box-shadow:0 0 0 0 rgba(91,140,255,0.4);
    animation:ripple 2.4s infinite;
  }
  @keyframes ripple{0%{box-shadow:0 0 0 0 rgba(91,140,255,0.35);} 70%{box-shadow:0 0 0 22px rgba(91,140,255,0);} 100%{box-shadow:0 0 0 0 rgba(91,140,255,0);}}
  .play-btn:hover{transform:scale(1.08);}
  .play-btn::after{content:''; width:0; height:0; margin-left:5px; border-top:11px solid transparent; border-bottom:11px solid transparent; border-left:17px solid #fff;}
  .video-caption{margin-top:16px; font-size:13px; color:var(--text-dim); text-align:center;}

  .problem{padding:90px 0; border-top:1px solid var(--line); position:relative;}
  .problem-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-top:44px;}
  @media (max-width:900px){ .problem-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .problem-grid{grid-template-columns:1fr;} }
  .p-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; transition:border-color 0.2s ease, transform 0.2s ease; backdrop-filter:blur(6px);}
  .p-card:hover{border-color:var(--blue); transform:translateY(-3px);}
  .p-card .num{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--blue); margin-bottom:12px; display:block;}
  .p-card h3{font-size:15.5px; font-weight:600; margin-bottom:8px;}
  .p-card p{font-size:13.5px; color:var(--text-dim); line-height:1.55;}

  .system{padding:90px 0; border-top:1px solid var(--line); position:relative;}
  .tabs{display:flex; gap:10px; margin-top:44px; flex-wrap:wrap;}
  .tab-btn{
    font-family:'JetBrains Mono',monospace; font-size:12.5px; padding:10px 16px; border-radius:8px;
    background:var(--panel); border:1px solid var(--line); color:var(--text-dim); cursor:pointer;
    transition:all 0.2s ease; backdrop-filter:blur(6px);
  }
  .tab-btn.active{background:var(--blue); color:#fff; border-color:var(--blue);}
  .tab-content{
    margin-top:24px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:34px;
    display:grid; grid-template-columns:1fr 1fr; gap:30px; align-items:center; backdrop-filter:blur(6px);
  }
  @media (max-width:800px){ .tab-content{grid-template-columns:1fr;} }
  .tab-content h3{font-size:20px; margin-bottom:12px; font-weight:600;}
  .tab-content p{color:var(--text-dim); font-size:14.5px; line-height:1.6; margin-bottom:16px;}
  .tab-content ul{list-style:none; display:flex; flex-direction:column; gap:8px;}
  .tab-content li{font-size:13.5px; color:var(--text-dim); display:flex; gap:8px; align-items:center;}
  .tab-content li::before{content:''; width:5px; height:5px; border-radius:50%; background:var(--mint); flex-shrink:0;}
  .tab-visual{
    height:180px; border-radius:10px; background:rgba(255,255,255,0.03); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace;
    color:var(--text-dim); font-size:12px; letter-spacing:1px;
  }

  .simple{padding:90px 0; border-top:1px solid var(--line); position:relative;}
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:44px;}
  @media (max-width:800px){ .steps{grid-template-columns:1fr;} }
  .step{position:relative; padding-left:20px; border-left:2px solid var(--line); transition:border-color 0.2s ease;}
  .step:hover{border-color:var(--mint);}
  .step .step-num{font-family:'JetBrains Mono',monospace; color:var(--mint); font-size:12px; margin-bottom:10px; display:block;}
  .step h3{font-size:16.5px; font-weight:600; margin-bottom:8px;}
  .step p{font-size:13.5px; color:var(--text-dim); line-height:1.6;}

  .final{padding:120px 0 110px; text-align:center; border-top:1px solid var(--line); position:relative;}
  .final h2{margin:0 auto 16px; max-width:520px;}
  .final p{color:var(--text-dim); max-width:440px; margin:0 auto 36px;}
  footer{padding:32px 0; border-top:1px solid var(--line); text-align:center; position:relative;}
  footer p{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const WHATSAPP_LINK = "https://wa.me/52XXXXXXXXXX?text=Hola%2C%20vi%20el%20ejemplo%20de%20landing%20de%20Konten.mx%20y%20quiero%20saber%20m%C3%A1s";

function BackgroundScene(){
  const mountRef = useRef(null);

  useEffect(() => {
    const mount = mountRef.current;
    let width = window.innerWidth, height = window.innerHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, width/height, 0.1, 1000);
    camera.position.set(0, 4, 30);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
    mount.appendChild(renderer.domElement);

    const group = new THREE.Group();

    const grid = new THREE.GridHelper(80, 40, 0x1B2434, 0x141926);
    grid.position.y = -9;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    group.add(grid);

    const wireMatBlue = new THREE.LineBasicMaterial({ color:0x5B8CFF, transparent:true, opacity:0.55 });
    const wireMatMint = new THREE.LineBasicMaterial({ color:0x00E5A0, transparent:true, opacity:0.45 });

    const shapes = [];
    function addWire(geo, mat, pos, scale){
      const edges = new THREE.EdgesGeometry(geo);
      const mesh = new THREE.LineSegments(edges, mat);
      mesh.position.set(...pos);
      mesh.scale.setScalar(scale);
      mesh.userData.spin = { x:(Math.random()-0.5)*0.006, y:(Math.random()-0.5)*0.006 };
      mesh.userData.float = { base: pos[1], amp: 0.6+Math.random()*0.8, speed: 0.4+Math.random()*0.4, phase: Math.random()*Math.PI*2 };
      group.add(mesh);
      shapes.push(mesh);
    }

    addWire(new THREE.IcosahedronGeometry(3.2, 0), wireMatBlue, [-13, 3, -6], 1);
    addWire(new THREE.TorusGeometry(2.6, 0.9, 8, 24), wireMatMint, [12, -2, -10], 1);
    addWire(new THREE.OctahedronGeometry(2.4, 0), wireMatBlue, [9, 6, -4], 1);
    addWire(new THREE.BoxGeometry(3.4, 3.4, 3.4), wireMatMint, [-10, -5, -12], 1);
    addWire(new THREE.IcosahedronGeometry(1.8, 0), wireMatBlue, [3, 8, -14], 1);
    addWire(new THREE.TorusGeometry(1.6, 0.5, 8, 20), wireMatBlue, [-4, -7, -8], 1);

    const NODE_COUNT = 60;
    const nodeGeo = new THREE.SphereGeometry(0.09, 8, 8);
    const nodeMatB = new THREE.MeshBasicMaterial({ color:0x5B8CFF });
    const nodeMatM = new THREE.MeshBasicMaterial({ color:0x00E5A0 });
    const nodes = [];
    for(let i=0;i<NODE_COUNT;i++){
      const mat = Math.random() > 0.8 ? nodeMatM : nodeMatB;
      const mesh = new THREE.Mesh(nodeGeo, mat);
      mesh.position.set((Math.random()-0.5)*46, (Math.random()-0.5)*30, (Math.random()-0.5)*30 - 10);
      group.add(mesh);
      nodes.push(mesh);
    }
    const lineMat = new THREE.LineBasicMaterial({ color:0x232B3C, transparent:true, opacity:0.5 });
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        if(nodes[i].position.distanceTo(nodes[j].position) < 7){
          const geo = new THREE.BufferGeometry().setFromPoints([nodes[i].position, nodes[j].position]);
          group.add(new THREE.Line(geo, lineMat));
        }
      }
    }

    scene.add(group);

    let mouseX = 0, mouseY = 0;
    const onMouseMove = (e) => {
      mouseX = (e.clientX/window.innerWidth - 0.5);
      mouseY = (e.clientY/window.innerHeight - 0.5);
    };
    window.addEventListener('mousemove', onMouseMove);

    const clock = new THREE.Clock();
    let frameId;
    const animate = () => {
      const t = clock.getElapsedTime();
      group.rotation.y += 0.0009;
      camera.position.x += (mouseX*4 - camera.position.x) * 0.02;
      camera.position.y += (4 - mouseY*3 - camera.position.y) * 0.02;
      camera.lookAt(0,0,0);
      shapes.forEach(s => {
        s.rotation.x += s.userData.spin.x;
        s.rotation.y += s.userData.spin.y;
        s.position.y = s.userData.float.base + Math.sin(t*s.userData.float.speed + s.userData.float.phase) * s.userData.float.amp;
      });
      renderer.render(scene, camera);
      frameId = requestAnimationFrame(animate);
    };
    animate();

    const onResize = () => {
      width = window.innerWidth; height = window.innerHeight;
      camera.aspect = width/height; camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    };
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(frameId);
      window.removeEventListener('resize', onResize);
      window.removeEventListener('mousemove', onMouseMove);
      mount.removeChild(renderer.domElement);
    };
  }, []);

  return <div id="bg-canvas" ref={mountRef}></div>;
}

function SystemTabs(){
  const tabs = [
    { id:0, label:'01 · Contenido', title:'Contenido que atrae', desc:'Producción lista para publicar, con copywriting y edición profesional pensada para detener el scroll.', items:['12 videos verticales con guion y edición','8 piezas o campañas de producto/servicio','Enfoque directo, sin relleno'] },
    { id:1, label:'02 · Landing', title:'Landing que filtra', desc:'Una sola puerta de entrada para que el visitante pase de curioso a prospecto calificado.', items:['Diseño enfocado en una sola acción','Redirección directa a WhatsApp','Filtra antes de que tú hables con ellos'] },
    { id:2, label:'03 · Automatización', title:'Automatización que cierra', desc:'Chatbot y flujos en n8n que responden, filtran y agendan sin depender de que alguien esté conectado.', items:['Responde preguntas frecuentes al instante','Agenda llamadas automáticamente','Da seguimiento si el prospecto no contesta'] },
  ];
  const [active, setActive] = useState(0);
  const t = tabs[active];

  return (
    <div>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} className={"tab-btn " + (active===tab.id ? 'active':'')} onClick={()=>setActive(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-content">
        <div>
          <h3>{t.title}</h3>
          <p>{t.desc}</p>
          <ul>{t.items.map((it,i)=>(<li key={i}>{it}</li>))}</ul>
        </div>
        <div className="tab-visual">MÓDULO {String(active+1).padStart(2,'0')} · EN VIVO</div>
      </div>
    </div>
  );
}

function App(){
  return (
    <React.Fragment>
      <BackgroundScene />
      <div className="bg-fade"></div>

      <header>
        <nav className="nav">
          <div className="logo">Konten<span>.mx</span></div>
          <a className="nav-cta" href={WHATSAPP_LINK} target="_blank" rel="noopener">
            Escribir por WhatsApp →
          </a>
        </nav>
      </header>

      <section className="hero">
        <div className="wrap" style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <div className="badge"><span className="dot"></span> ejemplo de landing</div>
          <h1>Un sistema que <span className="accent">hace todo por ti.</span></h1>
          <p>Contenido, landing page y automatización trabajando como un solo mecanismo: atraen, filtran y agendan clientes mientras tú atiendes tu negocio.</p>
          <div className="hero-ctas">
            <a className="btn-primary" href={WHATSAPP_LINK} target="_blank" rel="noopener">Ver el sistema en 15 min →</a>
            <a className="btn-ghost" href="#video">Ver el proceso</a>
          </div>
          <div className="scroll-hint"><span>SCROLL</span><span className="line"></span></div>
        </div>
      </section>

      <section className="video-section wrap" id="video">
        <p className="section-label">Cómo funciona</p>
        <h2>Todo el proceso, explicado en un video.</h2>
        <p className="section-intro">De la primera llamada al sistema funcionando en tu negocio — sin tecnicismos, paso a paso.</p>
        <div className="video-frame">
          <span className="corner-tag"><span className="dot"></span> VISTA PREVIA</span>
          <div className="play-btn"></div>
          <span className="duration">2:30</span>
        </div>
        <p className="video-caption">Video de ejemplo — próximamente el proceso completo de Konten.mx</p>
      </section>

      <section className="problem wrap">
        <p className="section-label">El problema</p>
        <h2>La mayoría de los negocios pierden clientes antes de hablar con ellos.</h2>
        <div className="problem-grid">
          <div className="p-card"><span className="num mono">01</span><h3>Contenido sin dirección</h3><p>Se publica seguido, pero sin copy ni edición pensada para generar interés real.</p></div>
          <div className="p-card"><span className="num mono">02</span><h3>No hay puerta clara</h3><p>El prospecto no sabe a dónde escribir ni qué esperar.</p></div>
          <div className="p-card"><span className="num mono">03</span><h3>Respuestas lentas</h3><p>Si no se contesta en minutos, ya está hablando con otro negocio.</p></div>
          <div className="p-card"><span className="num mono">04</span><h3>Nadie agenda</h3><p>El interés se queda en el chat y nunca se vuelve una cita real.</p></div>
        </div>
      </section>

      <section className="system wrap" id="sistema">
        <p className="section-label">El sistema</p>
        <h2>Tres módulos. Un solo mecanismo.</h2>
        <p className="section-intro">Cada pieza entrega trabajo listo a la siguiente — sin huecos, sin clientes perdidos en el camino.</p>
        <SystemTabs />
      </section>

      <section className="simple wrap">
        <p className="section-label">Facilidad</p>
        <h2>Tú apruebas. Nosotros ejecutamos.</h2>
        <div className="steps">
          <div className="step"><span className="step-num mono">Paso 1</span><h3>Cuéntanos tu negocio</h3><p>Una llamada corta para entender tu servicio y a quién le vendes.</p></div>
          <div className="step"><span className="step-num mono">Paso 2</span><h3>Armamos el sistema</h3><p>Contenido, landing y automatización listos en 15–21 días hábiles.</p></div>
          <div className="step"><span className="step-num mono">Paso 3</span><h3>Tú solo recibes clientes</h3><p>El sistema atrae, filtra y agenda — tú solo atiendes.</p></div>
        </div>
      </section>

      <section className="final wrap" id="contacto">
        <p className="section-label" style={{justifyContent:'center', display:'flex'}}>Siguiente paso</p>
        <h2>15 minutos para mostrarte el sistema funcionando.</h2>
        <p>Sin presentaciones largas ni PDFs. Te muestro el mecanismo trabajando en tiempo real.</p>
        <a className="btn-primary" href={WHATSAPP_LINK} target="_blank" rel="noopener">Escribir por WhatsApp →</a>
      </section>

      <footer><p>KONTEN.MX · PACHUCA, HIDALGO · © 2026</p></footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
